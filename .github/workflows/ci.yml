name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SITE_URL: ${{ vars.NEXT_PUBLIC_SITE_URL || 'https://example.com' }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      # Security: audit dependencies — fail on high/critical vulnerabilities
      - run: pnpm audit --audit-level=high

      - run: pnpm lint

      - run: pnpm test

      # TypeScript type check — independent build step
      - run: pnpm exec tsc --noEmit

      - run: pnpm check:seo

      - run: npx tsx scripts/generate-rss.ts

      - run: pnpm build

      # Bundle budget: fail if static output exceeds thresholds
      - run: pnpm exec tsx scripts/check-bundle-budget.ts

  bundle-analyze:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SITE_URL: ${{ vars.NEXT_PUBLIC_SITE_URL || 'https://example.com' }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Build with bundle analyzer
        run: pnpm analyze
        env:
          ANALYZE: 'true'

      - name: Upload analyzer reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bundle-analysis
          path: .next/analyze/
          retention-days: 14

  e2e:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SITE_URL: ${{ vars.NEXT_PUBLIC_SITE_URL || 'https://example.com' }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build for E2E
        run: pnpm build

      - name: Run E2E tests
        run: pnpm test:e2e

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

  lighthouse:
    runs-on: ubuntu-latest
    needs: quality
    env:
      NEXT_PUBLIC_SITE_URL: ${{ vars.NEXT_PUBLIC_SITE_URL || 'https://example.com' }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Build production bundle
        run: pnpm build

      # Lighthouse CI via treosh/lighthouse-ci-action — reuses lighthouse.config.js
      # (configPath) so all assertions (perf/a11y/seo/errors-in-console/canonical) are
      # preserved. Replaces @lhci/cli to drop its vulnerable transitive js-yaml 3.x.
      - name: Run Lighthouse CI audit
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: ./lighthouse.config.js
          uploadArtifacts: true

  deploy:
    runs-on: ubuntu-latest
    needs: [quality, e2e, lighthouse]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    env:
      NEXT_PUBLIC_SITE_URL: ${{ vars.NEXT_PUBLIC_SITE_URL || 'https://incca.ccwu.cc' }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: npx vercel@latest deploy --prod --yes --token "$VERCEL_TOKEN"
