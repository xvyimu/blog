name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      NEXT_PUBLIC_SITE_URL: ${{ vars.NEXT_PUBLIC_SITE_URL || 'https://incca.ccwu.cc' }}
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      # Security: audit dependencies — fail on high/critical vulnerabilities
      - run: pnpm audit --registry=https://registry.npmjs.org --audit-level=high

      - run: pnpm format:check

      - run: pnpm format:docs:check

      - run: pnpm lint

      - run: pnpm test

      - name: Upload vitest report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: vitest-report
          path: html/
          if-no-files-found: ignore
          retention-days: 14

      # TypeScript type check — independent build step
      - run: pnpm exec tsc --noEmit

      - run: pnpm check:seo

      - run: pnpm check:blur

      - run: pnpm build

      - name: Verify RSS artifacts are committed
        run: git diff --exit-code -- public/feed.xml public/feed.json

      # Bundle budget: fail if static output exceeds thresholds
      - run: pnpm exec tsx scripts/check-bundle-budget.ts

  bundle-analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      NEXT_PUBLIC_SITE_URL: ${{ vars.NEXT_PUBLIC_SITE_URL || 'https://incca.ccwu.cc' }}
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Build with bundle analyzer
        run: pnpm analyze
        env:
          ANALYZE: 'true'

      - name: Upload analyzer reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: bundle-analysis
          path: .next/analyze/
          if-no-files-found: ignore
          retention-days: 14

  e2e:
    runs-on: ubuntu-latest
    # Single production build shared by Playwright + Lighthouse (ARCH-3).
    # Cross-job .next artifacts lose BUILD_ID fidelity, so keep both on one runner.
    needs: quality
    timeout-minutes: 25
    env:
      NEXT_PUBLIC_SITE_URL: ${{ vars.NEXT_PUBLIC_SITE_URL || 'https://incca.ccwu.cc' }}
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build production bundle
        run: pnpm build

      - name: Run E2E tests
        run: pnpm test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore
          retention-days: 14

      # Lighthouse CI via treosh/lighthouse-ci-action — reuses lighthouse.config.js
      # (configPath). Shares the same .next from the build step above.
      - name: Run Lighthouse CI audit
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: ./lighthouse.config.js
          uploadArtifacts: true

  deploy:
    runs-on: ubuntu-latest
    needs: [quality, e2e]
    timeout-minutes: 10
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    env:
      NEXT_PUBLIC_SITE_URL: ${{ vars.NEXT_PUBLIC_SITE_URL || 'https://incca.ccwu.cc' }}
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      # No local build here: quality/e2e already gate the tree.
      # vercel deploy uploads source and builds on Vercel (single production build).
      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        # Pin CLI: avoid @latest drift (CFG-1). Bump deliberately after verify.
        run: npx vercel@56.2.1 deploy --prod --yes --token "$VERCEL_TOKEN"

      - name: Check production content
        run: pnpm check:production-content
